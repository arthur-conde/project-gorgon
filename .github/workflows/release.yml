name: Release

on:
  push:
    tags:
      - 'v*'

# Only one release per tag at a time. If somebody re-pushes a tag (or a queued run is
# still going), let the in-flight one finish and skip the redundant build.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Nerdbank.GitVersioning needs full history to compute height/SemVer.
          fetch-depth: 0

      # The windows-2025 runner ships with Microsoft Defender real-time scanning enabled.
      # Path-based exclusions weren't enough on their own (see prior CI runs at v0.0.1-test3
      # and v0.0.1-test4 — even with workspace + temp + runner-temp excluded, plus the
      # drive-level exclusions the image ships with, GandalfSplitMigrationTests still saw
      # files vanishing between write and read). dotnet/runtime, dotnet/sdk, and
      # dotnet/aspnetcore all disable real-time monitoring outright on their CI runners
      # for the same reason — and for build-perf, since Defender's inline scan slows
      # File I/O 2–5×. The runner VM is ephemeral and destroyed after the job, so there
      # is no persistent security weakening from this.
      - name: Disable Defender real-time monitoring
        shell: pwsh
        run: |
          Set-MpPreference -DisableRealtimeMonitoring $true
          Write-Host "Defender realtime monitoring disabled. Current state:"
          $p = Get-MpPreference
          "DisableRealtimeMonitoring = $($p.DisableRealtimeMonitoring)"
          "DisableBehaviorMonitoring = $($p.DisableBehaviorMonitoring)"
          "DisableScriptScanning     = $($p.DisableScriptScanning)"

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack and NBGV CLIs
        run: |
          dotnet tool install -g vpk
          dotnet tool install -g nbgv

      - name: Resolve version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $v = $tag.TrimStart('v')
          # Require at least 3 parts. Velopack's --packVersion rejects 2-part values
          # outright, and NBGV would otherwise fill a missing patch with commit-height
          # so the assembly version disagrees with the tag.
          if ($v -notmatch '^\d+(\.\d+){2,3}(-[A-Za-z0-9.-]+)?$') {
            Write-Error "Tag '$tag' does not look like a 3- or 4-part SemVer release tag (expected v1.2.3 or v1.2.3.4)."
            exit 1
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building Mithril v$v from $tag"

      # Sync version.json's `version` field to the tag so Nerdbank.GitVersioning
      # produces matching AssemblyVersion / FileVersion / InformationalVersion.
      # The rewrite happens in the runner's working tree only — the tag commit
      # is a detached HEAD checkout, so this never lands in git history. Without
      # this step NBGV computes height-based versions from version.json's static
      # value (e.g. "1.1.9") and the About panel disagrees with the Velopack
      # release label.
      - name: Sync version.json to tag
        run: nbgv set-version ${{ steps.ver.outputs.version }}

      - name: Restore
        run: dotnet restore Mithril.slnx

      # Build the whole solution first so every module's bin/Release/net10.0-windows/*.Module.dll
      # exists. The Shell csproj's StageMithrilModulesForPublish target globs from those paths,
      # so the four modules that aren't <ProjectReference>'d (Arwen/Saruman/Smaug/Celebrimbor)
      # only land in publish/ if they were already built. NBGV (driven by the synced
      # version.json above) sets all version attributes — no -p:Version override needed.
      - name: Build solution
        run: dotnet build Mithril.slnx -c Release --no-restore

      # Two-phase test execution. Tests marked [Trait("Category", "FileIO")] hit the
      # filesystem heavily and flake under cross-assembly parallelism on the runner —
      # the cause is environmental, not Defender (we ruled that out by disabling it
      # entirely at v0.0.1-test5 and seeing identical failures). Non-IO tests run in
      # full parallel mode for speed; IO tests run one assembly at a time.
      - name: Run non-IO tests (parallel)
        run: dotnet test Mithril.slnx -c Release --no-build --no-restore --filter "Category!=FileIO"

      # FileIO tests run one assembly at a time (cross-assembly serialization).
      # Inside each assembly, [Collection("FileIO")] + DisableParallelization=true
      # serializes FileIO classes against each other, eliminating the fixture-Dispose
      # race that caused STATUS_FILE_DELETED / OBJECT_PATH_NOT_FOUND on tests/.tmp/
      # (see GH issue #2 and ETW trace from v0.0.1-test10).
      - name: Run IO tests (sequential per assembly)
        shell: pwsh
        run: |
          $failed = @()
          # Mithril.MapCalibration.Harness.Tests is excluded from Mithril.slnx (issue #921,
          # to keep AssetsTools.NET / System.Drawing out of the main build) but still lives
          # under tests/ on disk. The main solution build above doesn't build it, so a
          # --no-build invocation here would fail on the missing assembly. It's covered by
          # its own isolated step below.
          Get-ChildItem -Path tests -Filter "*.csproj" -Recurse |
            Where-Object { $_.BaseName -ne 'Mithril.MapCalibration.Harness.Tests' } |
            ForEach-Object {
              Write-Host "::group::$($_.BaseName) (FileIO category)"
              dotnet test $_.FullName -c Release --no-build --no-restore --filter "Category=FileIO"
              if ($LASTEXITCODE -ne 0) { $failed += $_.BaseName }
              Write-Host "::endgroup::"
            }
          if ($failed.Count -gt 0) {
            Write-Error "FileIO tests failed in: $($failed -join ', ')"
            exit 1
          }

      # Map-calibration harness tests live in tools/Mithril.MapCalibration.Tools.slnx, not
      # Mithril.slnx — the harness's Tools.Common dep carries AssetsTools.NET + System.Drawing,
      # which we deliberately keep out of the main solution restore/build (issue #921). Run the
      # harness test project on its own so its build pulls those decoders in isolation while still
      # covering the engine unit tests + the ImageIo high-DPI regression guard ("bit us twice").
      # Targeted at the test csproj (not the whole tools solution) so the unused
      # MapCalibrationFromScreenshot / MapCalibrationWpf tools aren't compiled for nothing.
      - name: Run map-calibration harness tests (isolated, decoder deps)
        run: dotnet test tests/Mithril.MapCalibration.Harness.Tests/Mithril.MapCalibration.Harness.Tests.csproj -c Release

      # ─────────────────────────────────────────────────────────────────
      # Self-contained SKU: bundles .NET 10 desktop runtime (~150 MB).
      # ─────────────────────────────────────────────────────────────────
      - name: Publish (selfcontained)
        run: >
          dotnet publish src/Mithril.Shell/Mithril.Shell.csproj
          -c Release -r win-x64 --self-contained true --no-restore
          -p:PublishReadyToRun=true
          -p:MithrilUpdateChannel=selfcontained
          -o publish/selfcontained

      # Out-of-process asset-extraction sidecar (issue #931). Published into the
      # same dir vpk sweeps so it ships next to Mithril.exe; the app launches it
      # via System.Diagnostics.Process. It carries AssetsTools.NET + System.Drawing,
      # which stay out of the shipped src/** graph (issue #921) precisely BECAUSE
      # this is a separate exe behind a process boundary. Self-contained single-file
      # so the decoders are encapsulated in one binary.
      - name: Publish asset-extractor sidecar (selfcontained)
        run: >
          dotnet publish tools/Mithril.AssetExtractor/Mithril.AssetExtractor.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -o publish/selfcontained

      - name: Velopack pack (selfcontained)
        run: >
          vpk pack
          --packId MithrilShell
          --packTitle "Mithril for Project Gorgon"
          --packAuthors "Arthur Conde"
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish/selfcontained
          --mainExe Mithril.exe
          --channel selfcontained
          --icon src/Mithril.Shell/Resources/mithril.ico
          --outputDir releases

      # ─────────────────────────────────────────────────────────────────
      # Framework-dependent SKU: requires .NET 10 Desktop Runtime on host (~30 MB).
      # ─────────────────────────────────────────────────────────────────
      - name: Publish (fxdep)
        run: >
          dotnet publish src/Mithril.Shell/Mithril.Shell.csproj
          -c Release -r win-x64 --self-contained false --no-restore
          -p:PublishReadyToRun=true
          -p:MithrilUpdateChannel=fxdep
          -o publish/fxdep

      # Asset-extractor sidecar for the fxdep SKU (issue #931). Self-contained
      # single-file even in the fxdep variant: the sidecar's decoders are a
      # discrete artifact, decoupled from whether the shell bundles the runtime.
      - name: Publish asset-extractor sidecar (fxdep)
        run: >
          dotnet publish tools/Mithril.AssetExtractor/Mithril.AssetExtractor.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -o publish/fxdep

      - name: Velopack pack (fxdep)
        run: >
          vpk pack
          --packId MithrilShell
          --packTitle "Mithril for Project Gorgon"
          --packAuthors "Arthur Conde"
          --packVersion ${{ steps.ver.outputs.version }}
          --packDir publish/fxdep
          --mainExe Mithril.exe
          --channel fxdep
          --icon src/Mithril.Shell/Resources/mithril.ico
          --outputDir releases

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          # Quoted because the value has a literal `: ` (colon-space), which is the YAML
          # mapping indicator and would otherwise be misparsed as a nested mapping.
          name: "Mithril for Project: Gorgon ${{ steps.ver.outputs.version }}"
          generate_release_notes: true
          # Velopack writes Setup.exe, Portable.zip, *-full.nupkg, *-delta.nupkg, and
          # releases.{channel}.json per channel. The GithubSource client downloads
          # releases.{channel}.json to discover assets, so all of these must be attached.
          files: |
            releases/*.exe
            releases/*.zip
            releases/*.nupkg
            releases/releases*.json
