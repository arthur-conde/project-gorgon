services:
  seq:
    image: datalust/seq:latest
    container_name: mithril-seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINUSERNAME: "mithril"
      SEQ_FIRSTRUN_ADMINPASSWORD: "password"
    ports:
      - "5341:80"
    volumes:
      - seq-data:/data

volumes:
  seq-data:
